name: Deploy to Vercel

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: [ "CI/CD Pipeline" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  deploy-vercel:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Vercel CLI 설치
        run: npm install -g vercel

      - name: Vercel 배포 (프로덕션)
        run: vercel --prod --confirm
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  notify-success:
    runs-on: ubuntu-latest
    needs: deploy-vercel
    if: ${{ success() }}
    steps:
      - name: Slack 알림
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Vercel 배포 성공 ✅",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Vercel 배포 완료* ✅
Commit: <${{ github.event.head_commit.url }}|${{ github.event.head_commit.message }}>
Author: ${{ github.event.head_commit.author.name }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  notify-failure:
    runs-on: ubuntu-latest
    needs: deploy-vercel
    if: ${{ failure() }}
    steps:
      - name: Slack 알림 (실패)
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Vercel 배포 실패 ❌",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Vercel 배포 실패* ❌
Check logs: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Link>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
