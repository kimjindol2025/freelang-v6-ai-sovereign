name: Deploy to GCP

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: [ "CI/CD Pipeline" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  deploy-gcp:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: GCP 인증
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Google Cloud SDK 설정
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Docker 인증 설정
        run: |
          gcloud auth configure-docker gcr.io

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: 의존성 설치 및 빌드
        run: |
          npm ci
          npm run build

      - name: Docker 이미지 빌드 및 푸시
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/freelang-v6:${{ github.sha }} .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/freelang-v6:${{ github.sha }}

      - name: Cloud Run 배포
        run: |
          gcloud run deploy freelang-v6             --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/freelang-v6:${{ github.sha }}             --platform managed             --region us-central1             --allow-unauthenticated             --memory 2Gi             --cpu 2             --timeout 3600

  health-check-gcp:
    runs-on: ubuntu-latest
    needs: deploy-gcp
    steps:
      - name: 헬스 체크
        run: |
          curl -f https://freelang-v6-xxxxxxx.run.app/health || exit 1
