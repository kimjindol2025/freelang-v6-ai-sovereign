<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAUDELang Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .playground {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: #2d3748;
            color: white;
            padding: 15px 20px;
            font-weight: bold;
            border-bottom: 3px solid #667eea;
        }

        .panel-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        textarea {
            width: 100%;
            height: 500px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            resize: none;
            background: #f7fafc;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #output {
            background: #1a202c;
            color: #48bb78;
            border: 1px solid #4a5568;
        }

        .controls {
            padding: 20px;
            background: white;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-card {
            text-align: center;
            padding: 15px;
            background: #f7fafc;
            border-radius: 4px;
            border-left: 4px solid #667eea;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #718096;
            margin-top: 5px;
        }

        .message {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: none;
        }

        .message.success {
            background: #c6f6d5;
            border: 1px solid #9ae6b4;
            color: #22543d;
            display: block;
        }

        .message.error {
            background: #fed7d7;
            border: 1px solid #fc8181;
            color: #742a2a;
            display: block;
        }

        @media (max-width: 900px) {
            .playground {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <header>
            <h1>🚀 CLAUDELang Playground</h1>
            <p class="subtitle">AI를 위한 JSON 기반 프로그래밍 언어</p>
        </header>

        <!-- 메시지 -->
        <div id="message" class="message"></div>

        <!-- 제어 버튼 -->
        <div class="controls">
            <button class="btn-primary" onclick="executeProgram()">
                ▶️ 실행
            </button>
            <button class="btn-secondary" onclick="loadExample()">
                📋 예제 로드
            </button>
            <button class="btn-danger" onclick="clearAll()">
                🗑️  초기화
            </button>
        </div>

        <!-- 메인 플레이그라운드 -->
        <div class="playground">
            <!-- 입력 -->
            <div class="panel">
                <div class="panel-header">📝 CLAUDELang 프로그램</div>
                <div class="panel-content">
                    <textarea id="code" placeholder="CLAUDELang JSON 코드를 입력하세요..."></textarea>
                </div>
            </div>

            <!-- 출력 -->
            <div class="panel">
                <div class="panel-header">📤 실행 결과</div>
                <div class="panel-content">
                    <textarea id="output" readonly placeholder="실행 결과가 여기 표시됩니다..."></textarea>
                </div>
            </div>
        </div>

        <!-- 통계 -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="stat-vars">0</div>
                <div class="stat-label">변수</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-funcs">0</div>
                <div class="stat-label">함수 호출</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-conds">0</div>
                <div class="stat-label">조건문</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-time">0ms</div>
                <div class="stat-label">실행 시간</div>
            </div>
        </div>
    </div>

    <script>
        /**
         * CLAUDELang 브라우저 인터프리터
         */

        class CLAUDELangBrowserInterpreter {
            constructor() {
                this.scope = {};
                this.output = [];
                this.stats = {
                    variables: 0,
                    functions: 0,
                    conditions: 0,
                    time: 0
                };
            }

            execute(code) {
                const startTime = performance.now();
                this.scope = {};
                this.output = [];
                this.stats = {
                    variables: 0,
                    functions: 0,
                    conditions: 0,
                    time: 0
                };

                try {
                    // JSON 파싱
                    const program = typeof code === 'string' ? JSON.parse(code) : code;

                    // 메타데이터 출력
                    const metadata = program.metadata || {};
                    this.output.push(`📌 ${metadata.title || 'Untitled'}`);
                    this.output.push(`   ${metadata.description || ''}`);
                    this.output.push('');

                    // 명령어 실행
                    const instructions = program.instructions || [];
                    for (const instr of instructions) {
                        this._executeInstruction(instr);
                    }

                    this.stats.time = performance.now() - startTime;

                    return {
                        success: true,
                        output: this.output.join('\n'),
                        stats: this.stats
                    };

                } catch (error) {
                    this.stats.time = performance.now() - startTime;
                    return {
                        success: false,
                        error: error.message,
                        output: this.output.join('\n'),
                        stats: this.stats
                    };
                }
            }

            _executeInstruction(instr) {
                const type = instr.type;

                if (type === 'comment') {
                    this.output.push(`💬 ${instr.text}`);
                } else if (type === 'var') {
                    this._executeVar(instr);
                    this.stats.variables++;
                } else if (type === 'call') {
                    this._executeCall(instr);
                    this.stats.functions++;
                } else if (type === 'condition') {
                    this._executeCondition(instr);
                    this.stats.conditions++;
                }
            }

            _executeVar(instr) {
                const name = instr.name;
                const value = this._evaluateExpression(instr.value);
                this.scope[name] = value;
                this.output.push(`✓ ${name} = ${this._format(value)}`);
            }

            _executeCall(instr) {
                const funcName = instr.function;
                const args = (instr.args || []).map(arg => this._evaluateExpression(arg));
                const result = this._callFunction(funcName, args);

                if (instr.assign_to) {
                    this.scope[instr.assign_to] = result;
                    this.output.push(`✓ ${instr.assign_to} = ${funcName}(...) → ${this._format(result)}`);
                } else {
                    this.output.push(`✓ ${funcName}(...) → ${this._format(result)}`);
                }
            }

            _executeCondition(instr) {
                const test = instr.test;
                const condition = this._evaluateCondition(test);

                if (condition) {
                    this.output.push(`? 조건 TRUE → THEN 블록`);
                    (instr.then || []).forEach(i => this._executeInstruction(i));
                } else {
                    this.output.push(`? 조건 FALSE → ELSE 블록`);
                    (instr.else || []).forEach(i => this._executeInstruction(i));
                }
            }

            _evaluateExpression(expr) {
                if (typeof expr !== 'object') return expr;

                if (expr.type === 'literal') {
                    return expr.value;
                } else if (expr.type === 'ref') {
                    return this.scope[expr.name];
                } else if (expr.type === 'array') {
                    return (expr.elements || []).map(e => this._evaluateExpression(e));
                } else if (expr.type === 'object') {
                    const obj = {};
                    for (const [key, val] of Object.entries(expr.properties || {})) {
                        obj[key] = this._evaluateExpression(val);
                    }
                    return obj;
                }
                return expr;
            }

            _evaluateCondition(test) {
                if (test.type === 'comparison') {
                    const left = this._evaluateExpression(test.left);
                    const right = this._evaluateExpression(test.right);
                    const op = test.operator;

                    switch (op) {
                        case '>=': return left >= right;
                        case '>': return left > right;
                        case '<=': return left <= right;
                        case '<': return left < right;
                        case '==': return left === right;
                        case '!=': return left !== right;
                    }
                }
                return false;
            }

            _callFunction(name, args) {
                if (name === 'Array.filter') {
                    return args[0].filter(x => x >= 50000); // 예: 급여 > 50000
                } else if (name === 'Array.map') {
                    return args[0].map(x => x);
                } else if (name === 'Array.reduce') {
                    return args[0].reduce((a, b) => a + b.salary, 0);
                } else if (name === 'Array.length') {
                    return args[0].length;
                } else if (name === 'Math.div') {
                    return Math.floor(args[0] / args[1]);
                } else if (name === 'IO.print') {
                    const msg = String(args[0]);
                    this.output.push(msg);
                    return msg;
                }
                return null;
            }

            _format(val) {
                if (Array.isArray(val)) return `[${val.length} items]`;
                if (typeof val === 'object') return `{...}`;
                if (typeof val === 'string') return `"${val}"`;
                return String(val);
            }
        }

        // ============================================================
        // 예제 프로그램
        // ============================================================
        const EXAMPLE_PROGRAM = {
            version: "6.0",
            metadata: {
                title: "간단한 데이터 처리",
                description: "배열 필터링 및 집계 예제"
            },
            instructions: [
                { type: "comment", text: "=== 데이터 생성 ===" },
                {
                    type: "var",
                    name: "numbers",
                    value_type: "Array<i32>",
                    value: {
                        type: "array",
                        elements: [
                            { type: "literal", value_type: "i32", value: 10 },
                            { type: "literal", value_type: "i32", value: 20 },
                            { type: "literal", value_type: "i32", value: 30 },
                            { type: "literal", value_type: "i32", value: 40 },
                            { type: "literal", value_type: "i32", value: 50 }
                        ]
                    }
                },
                { type: "comment", text: "=== 필터링 (20 이상) ===" },
                {
                    type: "call",
                    function: "Array.filter",
                    args: [{ type: "ref", name: "numbers" }],
                    assign_to: "filtered"
                },
                { type: "comment", text: "=== 결과 ===" },
                {
                    type: "call",
                    function: "IO.print",
                    args: [{ type: "ref", name: "filtered" }]
                }
            ]
        };

        // ============================================================
        // UI 함수
        // ============================================================
        function executeProgram() {
            const code = document.getElementById('code').value;

            if (!code.trim()) {
                showMessage('코드를 입력하세요', 'error');
                return;
            }

            const interpreter = new CLAUDELangBrowserInterpreter();
            const result = interpreter.execute(code);

            document.getElementById('output').value = result.output;

            if (result.success) {
                showMessage('✅ 실행 성공', 'success');
            } else {
                showMessage(`❌ 오류: ${result.error}`, 'error');
            }

            // 통계 업데이트
            document.getElementById('stat-vars').textContent = result.stats.variables;
            document.getElementById('stat-funcs').textContent = result.stats.functions;
            document.getElementById('stat-conds').textContent = result.stats.conditions;
            document.getElementById('stat-time').textContent = result.stats.time.toFixed(0) + 'ms';
        }

        function loadExample() {
            document.getElementById('code').value = JSON.stringify(EXAMPLE_PROGRAM, null, 2);
            showMessage('📋 예제 로드됨', 'success');
        }

        function clearAll() {
            document.getElementById('code').value = '';
            document.getElementById('output').value = '';
            document.getElementById('stat-vars').textContent = '0';
            document.getElementById('stat-funcs').textContent = '0';
            document.getElementById('stat-conds').textContent = '0';
            document.getElementById('stat-time').textContent = '0ms';
            showMessage('🗑️  초기화됨', 'success');
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            setTimeout(() => {
                msg.className = 'message';
            }, 3000);
        }

        // 시작 시 예제 로드
        window.addEventListener('load', () => {
            loadExample();
        });

        // Ctrl+Enter로 실행
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                executeProgram();
            }
        });
    </script>
</body>
</html>
